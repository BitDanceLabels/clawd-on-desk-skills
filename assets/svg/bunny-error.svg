<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45" width="45" height="45">
  <defs>
    <radialGradient id="be-body" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f5eee8"/>
      <stop offset="100%" stop-color="#dfcfc1"/>
    </radialGradient>
    <radialGradient id="be-ear" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd1dc"/>
      <stop offset="100%" stop-color="#f4a8b8"/>
    </radialGradient>
  </defs>

  <ellipse cx="22.5" cy="40" rx="9.5" ry="1.4" fill="#000" opacity="0.18"/>

  <!-- nervous shake -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; -0.5,0; 0.5,0; -0.5,0; 0,0" dur="0.25s" repeatCount="indefinite"/>

    <!-- droopy ears -->
    <g transform="translate(17.5 14) rotate(-25)">
      <ellipse cx="0" cy="0" rx="2.6" ry="8" fill="url(#be-body)" stroke="#3a2a25" stroke-width="0.6"/>
      <ellipse cx="0" cy="0.5" rx="1.2" ry="5.5" fill="url(#be-ear)"/>
    </g>
    <g transform="translate(27.5 14) rotate(25)">
      <ellipse cx="0" cy="0" rx="2.6" ry="8" fill="url(#be-body)" stroke="#3a2a25" stroke-width="0.6"/>
      <ellipse cx="0" cy="0.5" rx="1.2" ry="5.5" fill="url(#be-ear)"/>
    </g>

    <!-- body -->
    <ellipse cx="22.5" cy="32" rx="11" ry="7.5" fill="url(#be-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <ellipse cx="15" cy="38" rx="3.4" ry="1.7" fill="url(#be-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <ellipse cx="30" cy="38" rx="3.4" ry="1.7" fill="url(#be-body)" stroke="#3a2a25" stroke-width="0.6"/>

    <!-- head -->
    <circle cx="22.5" cy="23" r="7.8" fill="url(#be-body)" stroke="#3a2a25" stroke-width="0.6"/>

    <!-- worried X eyes / squinted >_< -->
    <g stroke="#2a1a18" stroke-width="0.55" stroke-linecap="round" fill="none">
      <path d="M18,21 q1.5,1 3,0"/>
      <path d="M18,23 q1.5,-1 3,0"/>
      <path d="M24,21 q1.5,1 3,0"/>
      <path d="M24,23 q1.5,-1 3,0"/>
    </g>

    <!-- nose -->
    <path d="M21,25.5 Q22.5,24.7 24,25.5 Q22.5,26.5 21,25.5 Z" fill="#ff8aa6" stroke="#3a2a25" stroke-width="0.3"/>
    <!-- worried mouth (small wavy line) -->
    <path d="M20.5,27.5 q0.7,-0.6 1.4,0 q0.7,0.6 1.4,0 q0.7,-0.6 1.4,0"
      fill="none" stroke="#3a2a25" stroke-width="0.45" stroke-linecap="round"/>

    <!-- front paws covering face slightly -->
    <ellipse cx="17" cy="29" rx="1.7" ry="2.2" fill="url(#be-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <ellipse cx="28" cy="29" rx="1.7" ry="2.2" fill="url(#be-body)" stroke="#3a2a25" stroke-width="0.6"/>
  </g>

  <!-- sweat drop -->
  <g>
    <path d="M34,18 q-1.5,3 0,5 q1.5,-2 0,-5 Z" fill="#7ec8e3" stroke="#3a7a9c" stroke-width="0.3">
      <animate attributeName="opacity" values="0;1;0" dur="1.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- error icon -->
  <g>
    <circle cx="9" cy="13" r="3.5" fill="#ff4d4d" stroke="#a31818" stroke-width="0.5">
      <animate attributeName="r" values="3.2;3.7;3.2" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="9" y="15" font-size="5" font-weight="bold" fill="#fff" text-anchor="middle" font-family="sans-serif">!</text>
  </g>
</svg>
