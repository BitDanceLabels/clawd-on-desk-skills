<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <radialGradient id="bodyShade" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f7f1ec"/>
      <stop offset="100%" stop-color="#e6dcd2"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb3c1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffb3c1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="innerEar" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd1dc"/>
      <stop offset="100%" stop-color="#f4a8b8"/>
    </radialGradient>
  </defs>

  <!-- whole rabbit hops -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-12; 0,0; 0,-6; 0,0"
      keyTimes="0; 0.25; 0.5; 0.75; 1"
      dur="1.2s" repeatCount="indefinite"/>

    <!-- shadow on ground -->
    <ellipse cx="90" cy="158" rx="38" ry="6" fill="#000" opacity="0.18">
      <animate attributeName="rx" values="38; 28; 38; 32; 38" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.18; 0.08; 0.18; 0.12; 0.18" dur="1.2s" repeatCount="indefinite"/>
    </ellipse>

    <!-- left ear -->
    <g transform="translate(70 60)">
      <animateTransform attributeName="transform" type="rotate"
        values="-8 0 30; 6 0 30; -8 0 30"
        dur="2.4s" repeatCount="indefinite" additive="sum"/>
      <ellipse cx="0" cy="0" rx="11" ry="32" fill="url(#bodyShade)" stroke="#3a2a25" stroke-width="2"/>
      <ellipse cx="0" cy="2" rx="5" ry="22" fill="url(#innerEar)"/>
    </g>

    <!-- right ear -->
    <g transform="translate(110 60)">
      <animateTransform attributeName="transform" type="rotate"
        values="8 0 30; -6 0 30; 8 0 30"
        dur="2.4s" repeatCount="indefinite" additive="sum"/>
      <ellipse cx="0" cy="0" rx="11" ry="32" fill="url(#bodyShade)" stroke="#3a2a25" stroke-width="2"/>
      <ellipse cx="0" cy="2" rx="5" ry="22" fill="url(#innerEar)"/>
    </g>

    <!-- body -->
    <ellipse cx="90" cy="125" rx="45" ry="32" fill="url(#bodyShade)" stroke="#3a2a25" stroke-width="2"/>

    <!-- back foot left -->
    <ellipse cx="62" cy="148" rx="14" ry="7" fill="url(#bodyShade)" stroke="#3a2a25" stroke-width="2"/>
    <!-- back foot right -->
    <ellipse cx="118" cy="148" rx="14" ry="7" fill="url(#bodyShade)" stroke="#3a2a25" stroke-width="2"/>

    <!-- head -->
    <circle cx="90" cy="95" r="32" fill="url(#bodyShade)" stroke="#3a2a25" stroke-width="2"/>

    <!-- cheeks -->
    <circle cx="68" cy="100" r="9" fill="url(#cheek)"/>
    <circle cx="112" cy="100" r="9" fill="url(#cheek)"/>

    <!-- eyes -->
    <g>
      <ellipse cx="78" cy="90" rx="4" ry="6" fill="#2a1a18"/>
      <ellipse cx="102" cy="90" rx="4" ry="6" fill="#2a1a18"/>
      <!-- eye highlights -->
      <circle cx="79.5" cy="87.5" r="1.5" fill="#fff"/>
      <circle cx="103.5" cy="87.5" r="1.5" fill="#fff"/>
      <!-- blink -->
      <rect x="73" y="86" width="10" height="0" fill="url(#bodyShade)">
        <animate attributeName="height" values="0;0;0;0;0;0;0;6;0;0" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect x="97" y="86" width="10" height="0" fill="url(#bodyShade)">
        <animate attributeName="height" values="0;0;0;0;0;0;0;6;0;0" dur="4s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- nose -->
    <path d="M86,103 Q90,100 94,103 Q90,107 86,103 Z" fill="#ff8aa6" stroke="#3a2a25" stroke-width="1.2">
      <animateTransform attributeName="transform" type="scale"
        values="1 1; 1.15 0.85; 1 1"
        dur="0.8s" repeatCount="indefinite" additive="sum"/>
    </path>

    <!-- mouth -->
    <path d="M90,107 L90,111 M90,111 Q86,114 83,112 M90,111 Q94,114 97,112"
      fill="none" stroke="#3a2a25" stroke-width="1.5" stroke-linecap="round"/>

    <!-- whiskers -->
    <g stroke="#3a2a25" stroke-width="0.8" stroke-linecap="round" opacity="0.7">
      <line x1="60" y1="106" x2="48" y2="103"/>
      <line x1="60" y1="110" x2="48" y2="111"/>
      <line x1="120" y1="106" x2="132" y2="103"/>
      <line x1="120" y1="110" x2="132" y2="111"/>
    </g>

    <!-- front paws -->
    <ellipse cx="78" cy="138" rx="8" ry="11" fill="url(#bodyShade)" stroke="#3a2a25" stroke-width="2"/>
    <ellipse cx="102" cy="138" rx="8" ry="11" fill="url(#bodyShade)" stroke="#3a2a25" stroke-width="2"/>

    <!-- carrot held cute -->
    <g transform="translate(90 142) rotate(-12)">
      <path d="M-8,-4 L8,-4 L4,10 Q0,14 -4,10 Z" fill="#ff9a3c" stroke="#3a2a25" stroke-width="1.5"/>
      <path d="M-7,-4 Q-9,-12 -4,-10 M-2,-4 Q-1,-14 3,-10 M3,-4 Q6,-12 8,-9"
        fill="none" stroke="#3da55a" stroke-width="2.2" stroke-linecap="round"/>
    </g>
  </g>
</svg>
