<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45" width="45" height="45">
  <defs>
    <radialGradient id="ba-body" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f7f1ec"/>
      <stop offset="100%" stop-color="#e6dcd2"/>
    </radialGradient>
    <radialGradient id="ba-cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff95ad" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffb3c1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ba-ear" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd1dc"/>
      <stop offset="100%" stop-color="#f4a8b8"/>
    </radialGradient>
  </defs>

  <ellipse cx="22.5" cy="40" rx="9" ry="1.4" fill="#000" opacity="0.18">
    <animate attributeName="rx" values="9;7;9" dur="0.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- excited bounce -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-3.5; 0,0" dur="0.5s" repeatCount="indefinite"/>

    <!-- ears straight up, alert -->
    <g transform="translate(17.5 12)">
      <ellipse cx="0" cy="0" rx="2.6" ry="9" fill="url(#ba-body)" stroke="#3a2a25" stroke-width="0.6"/>
      <ellipse cx="0" cy="0.5" rx="1.2" ry="6" fill="url(#ba-ear)"/>
    </g>
    <g transform="translate(27.5 12)">
      <ellipse cx="0" cy="0" rx="2.6" ry="9" fill="url(#ba-body)" stroke="#3a2a25" stroke-width="0.6"/>
      <ellipse cx="0" cy="0.5" rx="1.2" ry="6" fill="url(#ba-ear)"/>
    </g>

    <!-- body -->
    <ellipse cx="22.5" cy="32" rx="11" ry="7.5" fill="url(#ba-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <ellipse cx="15" cy="38" rx="3.4" ry="1.7" fill="url(#ba-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <ellipse cx="30" cy="38" rx="3.4" ry="1.7" fill="url(#ba-body)" stroke="#3a2a25" stroke-width="0.6"/>

    <!-- head -->
    <circle cx="22.5" cy="23" r="7.8" fill="url(#ba-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <!-- bigger sparkly eyes -->
    <ellipse cx="19.5" cy="22" rx="1.4" ry="1.7" fill="#2a1a18"/>
    <ellipse cx="25.5" cy="22" rx="1.4" ry="1.7" fill="#2a1a18"/>
    <circle cx="19.95" cy="21.3" r="0.55" fill="#fff"/>
    <circle cx="25.95" cy="21.3" r="0.55" fill="#fff"/>
    <circle cx="19.1" cy="22.6" r="0.25" fill="#fff"/>
    <circle cx="25.1" cy="22.6" r="0.25" fill="#fff"/>

    <!-- big blushy cheeks -->
    <circle cx="16.8" cy="25" r="2.6" fill="url(#ba-cheek)"/>
    <circle cx="28.2" cy="25" r="2.6" fill="url(#ba-cheek)"/>

    <!-- nose -->
    <path d="M21,25.5 Q22.5,24.7 24,25.5 Q22.5,26.5 21,25.5 Z" fill="#ff8aa6" stroke="#3a2a25" stroke-width="0.3"/>
    <!-- open smile -->
    <path d="M20,27 Q22.5,29 25,27" fill="#552233" stroke="#3a2a25" stroke-width="0.45" stroke-linecap="round"/>

    <!-- front paws raised -->
    <ellipse cx="18" cy="28.5" rx="1.7" ry="2.2" fill="url(#ba-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <ellipse cx="27" cy="28.5" rx="1.7" ry="2.2" fill="url(#ba-body)" stroke="#3a2a25" stroke-width="0.6"/>
  </g>

  <!-- sparkles around -->
  <g fill="#ffd84a">
    <polygon points="8,18 9,16 10,18 12,19 10,20 9,22 8,20 6,19" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate"
        values="0 9 19; 360 9 19" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="0.8s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="36,10 37,8 38,10 40,11 38,12 37,14 36,12 34,11" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate"
        values="0 37 11; -360 37 11" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="0.8s" begin="0.4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="38,28 38.7,26.6 39.4,28 41,28.7 39.4,29.4 38.7,30.8 38,29.4 36.4,28.7" opacity="0.7">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1s" begin="0.2s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- exclamation -->
  <g>
    <text x="36" y="11" font-size="6" fill="#ff5577" font-weight="bold" font-family="sans-serif">!</text>
    <animate attributeName="opacity" values="0;1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </g>
</svg>
