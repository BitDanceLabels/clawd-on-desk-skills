<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45" width="45" height="45">
  <defs>
    <radialGradient id="bw-body" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f7f1ec"/>
      <stop offset="100%" stop-color="#e6dcd2"/>
    </radialGradient>
    <radialGradient id="bw-cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb3c1" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffb3c1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bw-ear" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd1dc"/>
      <stop offset="100%" stop-color="#f4a8b8"/>
    </radialGradient>
  </defs>

  <ellipse cx="22.5" cy="40" rx="10" ry="1.4" fill="#000" opacity="0.18"/>

  <!-- left ear (slight twitch) -->
  <g transform="translate(17.5 14)">
    <animateTransform attributeName="transform" type="rotate"
      values="-4 0 8; 2 0 8; -4 0 8" dur="3s" repeatCount="indefinite" additive="sum"/>
    <ellipse cx="0" cy="0" rx="2.8" ry="8" fill="url(#bw-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <ellipse cx="0" cy="0.5" rx="1.3" ry="5.5" fill="url(#bw-ear)"/>
  </g>
  <g transform="translate(27.5 14)">
    <animateTransform attributeName="transform" type="rotate"
      values="4 0 8; -2 0 8; 4 0 8" dur="3s" repeatCount="indefinite" additive="sum"/>
    <ellipse cx="0" cy="0" rx="2.8" ry="8" fill="url(#bw-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <ellipse cx="0" cy="0.5" rx="1.3" ry="5.5" fill="url(#bw-ear)"/>
  </g>

  <!-- body, sitting -->
  <ellipse cx="22.5" cy="32" rx="11" ry="7.5" fill="url(#bw-body)" stroke="#3a2a25" stroke-width="0.6"/>
  <!-- back feet visible to sides -->
  <ellipse cx="13.5" cy="37.5" rx="3" ry="1.6" fill="url(#bw-body)" stroke="#3a2a25" stroke-width="0.6"/>
  <ellipse cx="31.5" cy="37.5" rx="3" ry="1.6" fill="url(#bw-body)" stroke="#3a2a25" stroke-width="0.6"/>

  <!-- head, slightly tilted forward concentrating -->
  <g transform="translate(0 0.4)">
    <circle cx="22.5" cy="23" r="7.8" fill="url(#bw-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <circle cx="17.5" cy="24.8" r="2" fill="url(#bw-cheek)"/>
    <circle cx="27.5" cy="24.8" r="2" fill="url(#bw-cheek)"/>
    <!-- focused eyes (smaller, looking down at "keyboard") -->
    <ellipse cx="19.5" cy="22.6" rx="0.85" ry="1.1" fill="#2a1a18"/>
    <ellipse cx="25.5" cy="22.6" rx="0.85" ry="1.1" fill="#2a1a18"/>
    <!-- nose -->
    <path d="M21,25.7 Q22.5,24.9 24,25.7 Q22.5,26.7 21,25.7 Z" fill="#ff8aa6" stroke="#3a2a25" stroke-width="0.3"/>
    <!-- determined mouth -->
    <path d="M21.5,27 L23.5,27" fill="none" stroke="#3a2a25" stroke-width="0.45" stroke-linecap="round"/>
  </g>

  <!-- mini laptop/keyboard -->
  <g transform="translate(22.5 35)">
    <rect x="-4.5" y="-1.8" width="9" height="3.2" rx="0.4" fill="#dcdcdc" stroke="#3a2a25" stroke-width="0.5"/>
    <rect x="-3.8" y="-1.2" width="7.6" height="2" fill="#222"/>
    <!-- screen blink -->
    <rect x="-3.6" y="-0.8" width="2.2" height="0.4" fill="#7df9ff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="-1" y="-0.8" width="3.5" height="0.4" fill="#9bff9b" opacity="0.6">
      <animate attributeName="width" values="1.5;4.4;1.5" dur="0.9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- front paws typing — bob up/down -->
  <g>
    <ellipse cx="19" cy="34.5" rx="1.7" ry="2.2" fill="url(#bw-body)" stroke="#3a2a25" stroke-width="0.6">
      <animate attributeName="cy" values="34.5;33.6;34.5" dur="0.32s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="26" cy="34.5" rx="1.7" ry="2.2" fill="url(#bw-body)" stroke="#3a2a25" stroke-width="0.6">
      <animate attributeName="cy" values="34.5;33.6;34.5" dur="0.32s" begin="0.16s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- tiny "click" sparkles -->
  <g fill="#ffd84a" opacity="0">
    <circle cx="18" cy="33" r="0.5">
      <animate attributeName="opacity" values="0;1;0" dur="0.32s" repeatCount="indefinite"/>
    </circle>
    <circle cx="27" cy="33" r="0.5">
      <animate attributeName="opacity" values="0;1;0" dur="0.32s" begin="0.16s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
