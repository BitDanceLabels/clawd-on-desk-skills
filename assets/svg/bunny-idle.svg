<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45" width="45" height="45">
  <defs>
    <radialGradient id="b-body" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f7f1ec"/>
      <stop offset="100%" stop-color="#e6dcd2"/>
    </radialGradient>
    <radialGradient id="b-cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb3c1" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffb3c1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b-ear" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd1dc"/>
      <stop offset="100%" stop-color="#f4a8b8"/>
    </radialGradient>
  </defs>

  <g id="body-js">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-2.5; 0,0; 0,-1.2; 0,0"
      keyTimes="0; 0.25; 0.5; 0.75; 1" dur="1.4s" repeatCount="indefinite"/>

    <ellipse id="shadow-js" cx="22.5" cy="40" rx="9.5" ry="1.4" fill="#000" opacity="0.18">
      <animate attributeName="rx" values="9.5;7;9.5;8;9.5" dur="1.4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- left ear -->
    <g transform="translate(17.5 14)">
      <animateTransform attributeName="transform" type="rotate"
        values="-8 0 8; 6 0 8; -8 0 8" dur="2.4s" repeatCount="indefinite" additive="sum"/>
      <ellipse cx="0" cy="0" rx="2.8" ry="8" fill="url(#b-body)" stroke="#3a2a25" stroke-width="0.6"/>
      <ellipse cx="0" cy="0.5" rx="1.3" ry="5.5" fill="url(#b-ear)"/>
    </g>
    <!-- right ear -->
    <g transform="translate(27.5 14)">
      <animateTransform attributeName="transform" type="rotate"
        values="8 0 8; -6 0 8; 8 0 8" dur="2.4s" repeatCount="indefinite" additive="sum"/>
      <ellipse cx="0" cy="0" rx="2.8" ry="8" fill="url(#b-body)" stroke="#3a2a25" stroke-width="0.6"/>
      <ellipse cx="0" cy="0.5" rx="1.3" ry="5.5" fill="url(#b-ear)"/>
    </g>

    <!-- body -->
    <ellipse cx="22.5" cy="32" rx="11" ry="7.5" fill="url(#b-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <!-- back feet -->
    <ellipse cx="15" cy="38" rx="3.4" ry="1.7" fill="url(#b-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <ellipse cx="30" cy="38" rx="3.4" ry="1.7" fill="url(#b-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <!-- head -->
    <circle cx="22.5" cy="23" r="7.8" fill="url(#b-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <!-- cheeks -->
    <circle cx="17" cy="24.5" r="2.2" fill="url(#b-cheek)"/>
    <circle cx="28" cy="24.5" r="2.2" fill="url(#b-cheek)"/>

    <!-- eyes (with eye-tracking hook id) -->
    <g id="eyes-js">
      <ellipse cx="19.5" cy="22" rx="1.0" ry="1.4" fill="#2a1a18"/>
      <ellipse cx="25.5" cy="22" rx="1.0" ry="1.4" fill="#2a1a18"/>
      <circle cx="19.85" cy="21.4" r="0.35" fill="#fff"/>
      <circle cx="25.85" cy="21.4" r="0.35" fill="#fff"/>
    </g>
    <!-- blink overlays -->
    <rect x="18.4" y="21" width="2.4" height="0" fill="url(#b-body)">
      <animate attributeName="height" values="0;0;0;0;0;0;0;1.4;0;0" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="24.4" y="21" width="2.4" height="0" fill="url(#b-body)">
      <animate attributeName="height" values="0;0;0;0;0;0;0;1.4;0;0" dur="4.5s" repeatCount="indefinite"/>
    </rect>

    <!-- nose -->
    <path d="M21,25.5 Q22.5,24.7 24,25.5 Q22.5,26.5 21,25.5 Z" fill="#ff8aa6" stroke="#3a2a25" stroke-width="0.3"/>
    <!-- mouth -->
    <path d="M22.5,26.4 L22.5,27.4 M22.5,27.4 Q21.4,28.1 20.5,27.6 M22.5,27.4 Q23.6,28.1 24.5,27.6"
      fill="none" stroke="#3a2a25" stroke-width="0.45" stroke-linecap="round"/>
    <!-- whiskers -->
    <g stroke="#3a2a25" stroke-width="0.2" stroke-linecap="round" opacity="0.7">
      <line x1="15.5" y1="26" x2="12.5" y2="25.4"/>
      <line x1="15.5" y1="27" x2="12.5" y2="27.2"/>
      <line x1="29.5" y1="26" x2="32.5" y2="25.4"/>
      <line x1="29.5" y1="27" x2="32.5" y2="27.2"/>
    </g>
    <!-- front paws -->
    <ellipse cx="19" cy="35" rx="2" ry="2.7" fill="url(#b-body)" stroke="#3a2a25" stroke-width="0.6"/>
    <ellipse cx="26" cy="35" rx="2" ry="2.7" fill="url(#b-body)" stroke="#3a2a25" stroke-width="0.6"/>
  </g>
</svg>
